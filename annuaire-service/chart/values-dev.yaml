---
# Deltas pour l'environnement devhub-dev (stable, branche main).
# Seuls les champs qui DIFFÈRENT de values.yaml apparaissent ici.

ingress:
  enabled: true
  host: annuaire.devhub.local

env:
  LOG_LEVEL: debug

pdb:
  enabled: true
  minAvailable: 1

config:
  env: dev

# Hook PreSync de migration.
# `fail` est basculé à true par `make demo-hook-fail` pour démontrer qu'un hook
# PreSync en échec BLOQUE la phase Sync, puis remis à false par `make demo-hook-fix`.
migration:
  fail: false
