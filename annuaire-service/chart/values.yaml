---
# Values par défaut du chart annuaire.
# Surchargées par values-dev.yaml et values-preview.yaml selon l'environnement.

image:
  repository: ghcr.io/rems08/annuaire
  # tag par défaut vide — l'Application ArgoCD surcharge via helm.parameters
  # (mécanisme d'image promotion par PR depuis la CI). Fallback : appVersion du Chart.
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: annuaire.devhub.local
  path: /
  pathType: Prefix

env:
  LOG_LEVEL: info

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

pdb:
  enabled: false
  minAvailable: 1

# ConfigMap applicatif, appliqué en sync-wave -1 (avant le Deployment).
# Consommé par le Deployment via envFrom — étape 8 du polycopié.
config:
  enabled: true
  greeting: "Bienvenue sur DevHub Campus"
  env: dev

# Job de migration exécuté en hook PreSync avant chaque sync (étape 8).
# `fail: true` casse volontairement la migration pour démontrer qu'un hook
# PreSync en échec BLOQUE la sync (et déclenche la notif on-sync-failed).
migration:
  enabled: true
  image: busybox:1.36
  durationSeconds: 3
  backoffLimit: 1
  fail: false
