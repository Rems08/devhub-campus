---
name: annuaire-ci

on:
  push:
    branches: [main]
    paths:
      - 'annuaire-service/**'
      - '.github/workflows/annuaire-ci.yml'
  pull_request:
    paths:
      - 'annuaire-service/**'

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rems08/annuaire
  SERVICE_DIR: annuaire-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.SERVICE_DIR }}/Dockerfile
          ignore: DL3018
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.4'
      - name: helm lint
        run: helm lint ${{ env.SERVICE_DIR }}/chart

  build-and-scan:
    name: Build + Trivy scan + Push GHCR
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      sha-short: ${{ steps.meta.outputs.sha-short }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Compute short SHA
        run: echo "sha-short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha-short }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Trivy scan (HIGH,CRITICAL fail)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha-short }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha-short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-main

  bump-platform:
    # Image promotion : ouvre une PR sur platform/apps/dev/annuaire.yaml qui
    # met à jour helm.parameters[name=image.tag] avec le nouveau SHA.
    # L'humain merge → ArgoCD synchronise.
    name: Bump platform image tag
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PLATFORM_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Update image.tag in platform/apps/dev/annuaire.yaml
        env:
          NEW_TAG: ${{ needs.build-and-scan.outputs.sha-short }}
        run: |
          set -e
          sudo snap install yq || (sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            && sudo chmod +x /usr/local/bin/yq)
          yq -i '(.spec.source.helm.parameters[] | select(.name == "image.tag")).value = strenv(NEW_TAG)' \
            platform/apps/dev/annuaire.yaml

      - uses: peter-evans/create-pull-request@v6
        with:
          branch: bump/annuaire-${{ needs.build-and-scan.outputs.sha-short }}
          commit-message: "chore(annuaire): bump image to ${{ needs.build-and-scan.outputs.sha-short }}"
          title: "chore(annuaire): bump image to ${{ needs.build-and-scan.outputs.sha-short }}"
          body: |
            Image **annuaire** taguée `${{ needs.build-and-scan.outputs.sha-short }}` a passé build + trivy scan.

            Merge cette PR pour propager au cluster via ArgoCD.
          labels: |
            type/image-bump
            service/annuaire
