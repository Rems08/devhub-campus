---
extends: default

rules:
  line-length:
    max: 140
    level: warning
  comments-indentation: disable
  document-start: disable
  truthy:
    check-keys: false
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  **/charts/**
  **/templates/**
  **/node_modules/**
  **/.venv/**
