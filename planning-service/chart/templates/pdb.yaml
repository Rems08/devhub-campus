---
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "planning.selectorLabels" . | nindent 6 }}
{{- end -}}
