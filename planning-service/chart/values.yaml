---
image:
  repository: ghcr.io/rems08/planning
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: planning.devhub.local
  path: /
  pathType: Prefix

env:
  LOG_LEVEL: info

resources:
  requests:
    cpu: 100m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 192Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

pdb:
  enabled: false
  minAvailable: 1

# ConfigMap applicatif, appliqué en sync-wave -1 (avant le Deployment).
# Consommé par le Deployment via envFrom — étape 8 du polycopié.
config:
  enabled: true
  greeting: "Bienvenue sur DevHub Campus"
  env: dev

# Job de migration exécuté en hook PreSync avant chaque sync (étape 8).
# `fail: true` casse volontairement la migration pour démontrer qu'un hook
# PreSync en échec BLOQUE la sync (et déclenche la notif on-sync-failed).
migration:
  enabled: true
  image: busybox:1.36
  durationSeconds: 3
  backoffLimit: 1
  fail: false
