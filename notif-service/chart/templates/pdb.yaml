---
{{- if .Values.pdb.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "notif.fullname" . }}
  labels:
    {{- include "notif.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "notif.selectorLabels" . | nindent 6 }}
{{- end -}}
