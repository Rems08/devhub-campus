---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: planning-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: https://github.com/Rems08/devhub-campus.git
    targetRevision: main
    path: planning-service/chart
    helm:
      valueFiles:
        - values-dev.yaml
      parameters:
        - name: image.tag
          value: "dev"

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
