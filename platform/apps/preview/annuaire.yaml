---
# ApplicationSet : annuaire — previews par pull request.
#
# Pour chaque PR ouverte sur le repo, ArgoCD génère une Application
# `annuaire-preview-<branch_slug>` dans un namespace dédié
# `devhub-preview-<branch_slug>`, avec un ingress
# `<branch_slug>.devhub.local`. Supprimée à la fermeture de la PR.
#
# Choix du generator : pullRequest (vs git). Justification dans RAPPORT.md.
#
# Prérequis : un secret github-token dans le namespace argocd :
#   kubectl -n argocd create secret generic github-token \
#       --from-literal=token="$GITHUB_TOKEN"
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: annuaire-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - pullRequest:
        github:
          owner: Rems08
          repo: devhub-campus
          tokenRef:
            secretName: github-token
            key: token
          # ne génère que pour les PRs ouvertes avec le label `preview`
          labels:
            - preview
        requeueAfterSeconds: 60

  template:
    metadata:
      name: 'annuaire-preview-{{.branch_slug}}'
      labels:
        devhub.io/env: preview
        devhub.io/service: annuaire
        devhub.io/pr: '{{.number}}'
    spec:
      project: devhub
      source:
        repoURL: https://github.com/Rems08/devhub-campus.git
        targetRevision: '{{.branch}}'
        path: annuaire-service/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: image.tag
              value: '{{.head_short_sha}}'
            - name: ingress.host
              value: 'annuaire-{{.branch_slug}}.devhub.local'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'devhub-preview-{{.branch_slug}}'
      syncPolicy:
        automated:
          prune: true     # OBLIGATOIRE : sinon les previews ne se nettoient jamais
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
